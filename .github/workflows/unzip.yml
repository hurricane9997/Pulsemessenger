name: Unzip Pulse

on:
  push:
    paths:
      - 'pulse.zip'

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip file
        run: |
          unzip pulse.zip -d extracted

      - name: Move files to root
        run: |
          mv extracted/* .
          rm -rf extracted pulse.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzipped pulse.zip"
          git push
