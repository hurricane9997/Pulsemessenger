
name: Unzip Pulse to Root

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show current directory
        run: |
          pwd
          ls -la

      # If pulse.zip is inside your repo, make sure path is correct
      - name: Check pulse.zip exists
        run: |
          if [ ! -f "pulse.zip" ]; then
            echo "❌ pulse.zip not found!"
            exit 1
          fi
          echo "✅ pulse.zip found"

      - name: Unzip pulse.zip to root
        run: |
          unzip -o pulse.zip -d .
          echo "After unzip:"
          ls -la

      # Optional: flatten if zip has a folder inside
      - name: Flatten structure (optional)
        run: |
          shopt -s dotglob
          for d in */ ; do
            if [ "$d" != ".git/" ]; then
              mv "$d"* . 2>/dev/null || true
              rm -rf "$d"
            fi
          done
