name: Unzip Pulse to Root

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ opt-in to Node 24

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -name "*.zip"

      # If needed, download pulse.zip
      # - name: Download pulse.zip
      #   run: curl -L -o pulse.zip "YOUR_URL"

      - name: Ensure pulse.zip exists
        run: |
          if [ ! -f "pulse.zip" ]; then
            echo "❌ pulse.zip not found"
            exit 1
          fi

      - name: Unzip to root
        run: |
          unzip -o pulse.zip -d .
          ls -la

      - name: Flatten (if zip has folder inside)
        run: |
          shopt -s dotglob
          for d in */ ; do
            if [ "$d" != ".git/" ]; then
              mv "$d"* . 2>/dev/null || true
              rm -rf "$d"
            fi
          done
