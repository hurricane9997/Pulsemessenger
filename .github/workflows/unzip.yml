name: Unzip to Root (Stable)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Remove git lock if exists
        run: rm -rf .git/index.lock || true

      - name: Unzip safely to root
        run: unzip -o auth-system-github.zip -x "*.git*" -d .

      - name: Show files
        run: ls -la

      - name: Commit changes (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted zip" || echo "No changes"
          git push
