name: Unzip to Root (Fixed)

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Clean possible conflicting files
        run: |
          rm -rf .git/index.lock || true

      - name: Unzip safely (exclude .git)
        run: |
          unzip -o auth-system-github.zip -x "*.git*" -d .

      - name: Verify extraction
        run: ls -la

      - name: Commit changes (optional)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted auth-system-github.zip" || echo "No changes"
          git push
