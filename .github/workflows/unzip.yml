name: Unzip Pulse

on:
  push:
    branches:
      - main

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Unzip pulse.zip
        run: |
          if [ -f "pulse.zip" ]; then
            unzip -o pulse.zip
          else
            echo "pulse.zip not found!"
            exit 1
          fi

      - name: List after unzip (debug)
        run: ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzipped pulse.zip" || echo "No changes to commit"
          git push
