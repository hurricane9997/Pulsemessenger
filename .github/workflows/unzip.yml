name: Unzip to Root

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip safely
        run: unzip -o auth-system-github.zip -x "*.git*"

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted zip" || echo "No changes"
          git push
