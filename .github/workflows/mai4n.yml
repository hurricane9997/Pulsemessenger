name: Unzip Pulse

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug - check files
        run: ls -la

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Verify ZIP exists
        run: |
          if [ ! -f "pulse.zip" ]; then
            echo "❌ pulse.zip not found in repo root"
            exit 1
          fi

      - name: Create temp folder
        run: mkdir -p temp_unzip

      - name: Unzip safely
        run: unzip -o pulse.zip -d temp_unzip

      - name: Remove .git if present
        run: rm -rf temp_unzip/.git

      - name: Copy to root safely
        run: rsync -av --exclude='.git' temp_unzip/ .

      - name: Cleanup
        run: rm -rf temp_unzip

      - name: Final files
        run: ls -la
