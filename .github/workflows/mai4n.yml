name: Unzip Pulse (Guaranteed)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show repo files BEFORE
        run: ls -la

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Check ZIP content
        run: unzip -l pulse.zip

      - name: Unzip to root
        run: unzip -o pulse.zip

      - name: Show files AFTER unzip
        run: ls -la

      - name: Commit extracted files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzipped pulse.zip" || echo "No changes"
          git push
