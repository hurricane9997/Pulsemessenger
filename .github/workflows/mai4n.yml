name: Unzip Pulse (Stable)

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Create temp directory
        run: mkdir temp

      - name: Extract zip safely
        run: unzip -o pulse.zip -d temp

      - name: Remove any .git from zip
        run: rm -rf temp/.git

      - name: Copy files to repo root
        run: rsync -av temp/ .

      - name: Cleanup
        run: rm -rf temp

      - name: Show final files
        run: ls -la

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted pulse.zip" || echo "No changes"
          git push
