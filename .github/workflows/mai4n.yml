name: Unzip Pulse

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip file
        run: unzip -o pulse.zip

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Add changes
        run: git add .

      - name: Commit changes
        run: git commit -m "Unzipped pulse.zip" || echo "No changes to commit"

      - name: Pull latest (avoid conflict)
        run: git pull --rebase

      - name: Push changes
        run: git push
