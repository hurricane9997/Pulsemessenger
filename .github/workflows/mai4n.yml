name: Extract Pulse (Fix 128)

on:
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files before
        run: ls -la

      - name: Extract using bsdtar
        run: |
          mkdir temp
          bsdtar -xf pulse.zip -C temp

      - name: Show extracted files
        run: ls -R temp

      - name: Move files to root safely
        run: rsync -av temp/ .

      - name: Cleanup
        run: rm -rf temp

      - name: Show final files
        run: ls -la

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted pulse.zip" || echo "No changes"
          git push
