name: Extract Pulse (No Unzip Error)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show files before
        run: ls -la

      - name: Extract zip using Python
        run: |
          python3 - <<EOF
          import zipfile
          with zipfile.ZipFile('pulse.zip', 'r') as zip_ref:
              zip_ref.extractall('temp')
          EOF

      - name: Show extracted files
        run: ls -R temp

      - name: Move files to root
        run: |
          cp -r temp/* .
          rm -rf temp

      - name: Show final files
        run: ls -la

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted pulse.zip" || echo "No changes"
          git push
