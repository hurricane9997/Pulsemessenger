name: Unzip Pulse (Fix 127)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip rsync

      - name: Check ZIP exists
        run: ls -la

      - name: Unzip file
        run: unzip -o pulse.zip

      - name: Verify extraction
        run: ls -la

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Unzipped pulse.zip" || echo "No changes"
          git push
