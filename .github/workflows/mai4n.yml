name: Extract Pulse (Final Fix)

on:
  workflow_dispatch:

permissions:
  contents: write   # 🔥 THIS FIXES ERROR 128 (403)

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Extract zip using Python
        run: |
          python3 - <<EOF
          import zipfile
          with zipfile.ZipFile('pulse.zip', 'r') as zip_ref:
              zip_ref.extractall('temp')
          EOF

      - name: Move files to root
        run: |
          cp -r temp/* .
          rm -rf temp

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted pulse.zip" || echo "No changes"
          git push
