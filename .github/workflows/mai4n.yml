name: Unzip Pulse (Correct)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Unzip directly to root
        run: unzip -o pulse.zip -d .

      - name: Remove .git if accidentally included
        run: rm -rf .git

      - name: Show files
        run: ls -la

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Extracted pulse.zip" || echo "No changes"
          git push
